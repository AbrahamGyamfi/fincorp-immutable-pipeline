name: Immutable Artifact Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:      eu-west-1
  ECR_REPOSITORY:  fincorp-api
  IMAGE_TAG:       ${{ github.sha }}

permissions:
  id-token:        write   # OIDC — no long-lived AWS keys
  contents:        read
  security-events: write   # upload SARIF to GitHub Security tab
  packages:        write   # Cosign push to OCI registry

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Secrets scan — block leaked credentials before anything else runs
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can diff all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: SAST — static code analysis
  # ─────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Dependency review — flag new CVEs introduced in PRs
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Build and test through CodeArtifact proxy (npm + pip)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (via CodeArtifact)
    runs-on: ubuntu-latest
    needs: [secrets-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CodeArtifact auth token
        id: ca-token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain fincorp \
            --domain-owner ${{ secrets.AWS_ACCOUNT_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # ── npm via CodeArtifact ─────────────────────────────────────────────────
      - name: Configure npm → CodeArtifact
        run: |
          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain fincorp \
            --domain-owner ${{ secrets.AWS_ACCOUNT_ID }} \
            --repository fincorp-npm \
            --format npm \
            --region ${{ env.AWS_REGION }} \
            --query repositoryEndpoint --output text)
          npm config set registry "$ENDPOINT"
          npm config set "//${ENDPOINT#https://}:_authToken" "${{ steps.ca-token.outputs.token }}"

      # ── pip via CodeArtifact ─────────────────────────────────────────────────
      - name: Configure pip → CodeArtifact
        run: |
          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain fincorp \
            --domain-owner ${{ secrets.AWS_ACCOUNT_ID }} \
            --repository fincorp-pypi \
            --format pypi \
            --region ${{ env.AWS_REGION }} \
            --query repositoryEndpoint --output text)
          pip config set global.index-url \
            "https://aws:${{ steps.ca-token.outputs.token }}@${ENDPOINT#https://}simple/"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & test
        working-directory: app
        run: |
          npm ci
          npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Pre-push vulnerability scan with Trivy (fast feedback before ECR)
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Pre-push Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build image locally for scanning
        working-directory: app
        run: docker build -t fincorp-api:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fincorp-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'       # fail the job if any CRITICAL or HIGH found
          ignore-unfixed: true # ignore vulns with no available fix

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-pre-push

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fincorp-api:scan
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 365

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Push immutable image to ECR + ECR scan gate
  # ─────────────────────────────────────────────────────────────────────────────
  push-and-gate:
    name: Push to ECR → Vulnerability Gate
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    if: github.ref == 'refs/heads/main'
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
      registry:  ${{ steps.ecr-login.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: push
        working-directory: app
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IMAGE_URI="$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE_URI" .

          docker push "$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      # ── ECR scan gate ────────────────────────────────────────────────────────
      - name: Wait for ECR scan
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ecr describe-image-scan-findings \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --image-id imageTag=${{ env.IMAGE_TAG }} \
              --query 'imageScanStatus.status' \
              --output text 2>/dev/null || echo "PENDING")
            echo "[$i/30] ECR scan: $STATUS"
            [ "$STATUS" = "COMPLETE" ] && break
            sleep 10
          done
          [ "$STATUS" = "COMPLETE" ] || { echo "Scan timed out"; exit 1; }

      - name: Enforce gate — fail on High or Critical
        run: |
          COUNTS=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ env.IMAGE_TAG }} \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json)

          HIGH=$(echo "$COUNTS"     | jq -r '.HIGH     // 0')
          CRITICAL=$(echo "$COUNTS" | jq -r '.CRITICAL // 0')

          echo "CRITICAL: $CRITICAL  HIGH: $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "PIPELINE BLOCKED — $CRITICAL Critical, $HIGH High CVEs."
            exit 1
          fi
          echo "Gate PASSED."

      - name: Export ECR findings as SARIF
        if: always()
        run: |
          aws ecr describe-image-scan-findings \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ env.IMAGE_TAG }} \
            --output json > ecr-scan.json

          python3 - <<'EOF'
          import json
          data   = json.load(open("ecr-scan.json"))
          levels = {"CRITICAL":"error","HIGH":"error","MEDIUM":"warning"}
          sarif  = {"version":"2.1.0","runs":[{"tool":{"driver":{"name":"ECR Scan","rules":[]}},"results":[]}]}
          for f in data.get("imageScanFindings",{}).get("findings",[]):
              sarif["runs"][0]["results"].append({
                  "ruleId": f.get("name","unknown"),
                  "level":  levels.get(f.get("severity",""),"note"),
                  "message":{"text": f.get("description","")},
                  "locations":[{"physicalLocation":{"artifactLocation":{"uri":"Dockerfile"}}}]
              })
          json.dump(sarif, open("ecr-scan.sarif","w"), indent=2)
          print(f"Exported {len(sarif['runs'][0]['results'])} findings.")
          EOF

      - name: Upload ECR SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ecr-scan.sarif
          category: ecr-image-scan

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 7: Sign the image with Cosign and promote to :stable
  # ─────────────────────────────────────────────────────────────────────────────
  sign-and-promote:
    name: Sign (Cosign) → Promote to :stable
    runs-on: ubuntu-latest
    needs: [push-and-gate]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing — uses GitHub OIDC identity as the signing identity.
      # The signature and transparency log entry (Rekor) prove:
      #   • which commit triggered the build
      #   • which GitHub Actions workflow signed it
      #   • timestamp of signing
      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "${{ needs.push-and-gate.outputs.image-uri }}"

      - name: Attach SBOM attestation to image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Download SBOM artifact from trivy-scan job
          # (in a real pipeline: download-artifact then attach)
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${{ needs.push-and-gate.outputs.image-uri }}" || true

      - name: Promote to :stable
        run: |
          REGISTRY="${{ needs.push-and-gate.outputs.registry }}"
          docker pull "$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          docker tag  "$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" \
                      "$REGISTRY/${{ env.ECR_REPOSITORY }}:stable"
          docker push "$REGISTRY/${{ env.ECR_REPOSITORY }}:stable"

          echo "Promoted ${{ env.IMAGE_TAG }} → stable"
          echo "Signed image: ${{ needs.push-and-gate.outputs.image-uri }}"
